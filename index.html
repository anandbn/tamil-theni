<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>Tamil Kids Flashcards</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Fredoka:wght@400;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary-color: #ff6b6b;
      --secondary-color: #4ecdc4;
      --accent-color: #ffe66d;
      --text-color: #2c3e50;
      --bg-color: #f7f9fc;
      --card-bg: #ffffff;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
    }

    body {
      font-family: "Fredoka", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      overflow: hidden;
      /* Prevent scrolling */
      width: 100vw;
      height: 100vh;
    }

    /* Screens */
    .screen {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: absolute;
      top: 0;
      left: 0;
    }

    .screen.active {
      display: flex;
    }

    /* Setup Screen */
    #start-screen {
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      padding: 20px;
      text-align: center;
    }

    .title {
      font-family: "Baloo Thambi 2", cursive;
      font-size: 4rem;
      color: #ff5252;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      margin-bottom: 40px;
    }

    .start-btn {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 20px 60px;
      font-size: 3rem;
      font-family: "Baloo Thambi 2", cursive;
      font-weight: 800;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 0 #cc4b4b, 0 15px 20px rgba(0, 0, 0, 0.2);
      transition: transform 0.1s, box-shadow 0.1s;
      margin-bottom: 40px;
    }

    .start-btn:active {
      transform: translateY(8px);
      box-shadow: 0 0 0 #cc4b4b, 0 5px 10px rgba(0, 0, 0, 0.2);
    }

    .toggle-container {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 1.8rem;
      background: white;
      padding: 15px 30px;
      border-radius: 30px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      cursor: pointer;
    }

    input[type="checkbox"] {
      width: 30px;
      height: 30px;
      cursor: pointer;
      accent-color: var(--secondary-color);
    }

    /* Slide Screen */
    #slide-screen {
      background-color: var(--bg-color);
    }

    .top-bar {
      width: 100%;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .home-btn {
      background: white;
      border: 2px solid #ddd;
      color: var(--text-color);
      font-size: 2rem;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: background 0.2s;
      text-decoration: none;
    }

    .home-btn:hover {
      background: #f0f0f0;
    }

    .timer {
      font-size: 2rem;
      font-weight: bold;
      background: var(--accent-color);
      padding: 5px 20px;
      border-radius: 20px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      color: #d35400;
      min-width: 80px;
      text-align: center;
      display: none;
      /* Hidden on category slides */
    }

    .word-counter {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--text-color);
      background: white;
      padding: 5px 20px;
      border-radius: 20px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .flashcard-container {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 80px 20px 20px 20px;
      /* Space for top bar */
      position: relative;
    }

    .card {
      background: var(--card-bg);
      width: 100%;
      max-width: 800px;
      height: 60vh;
      min-height: 400px;
      border-radius: 40px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px;
      cursor: pointer;
      position: relative;
      border: 8px solid white;
    }

    .content-area {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      width: 100%;
    }

    /* Category styling */
    .category-text {
      font-size: 4rem;
      color: var(--secondary-color);
      font-weight: 700;
      display: none;
      font-family: "Baloo Thambi 2", cursive;
    }

    /* Word styling */
    .english-word {
      font-size: 5rem;
      color: var(--text-color);
      font-weight: 700;
      margin-bottom: 30px;
      display: none;
    }

    .tamil-word {
      font-size: 6rem;
      color: var(--primary-color);
      font-family: "Baloo Thambi 2", cursive;
      font-weight: 800;
      opacity: 0;
      transform: scale(0.8);
      display: none;
    }

    .tamil-word.revealed {
      opacity: 1;
      transform: scale(1);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* Navigation Buttons */
    .nav-controls {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 1000px;
      padding: 20px;
      position: absolute;
      bottom: 30px;
    }

    .nav-btn {
      background: var(--secondary-color);
      color: white;
      border: none;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      font-size: 3rem;
      cursor: pointer;
      box-shadow: 0 6px 0 #288f88, 0 10px 15px rgba(0, 0, 0, 0.2);
      transition: transform 0.1s, box-shadow 0.1s;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-bottom: 8px;
      /* Optical alignment for arrows */
    }

    #prev-btn {
      padding-right: 8px;
    }

    #next-btn {
      padding-left: 8px;
    }

    .nav-btn:active {
      transform: translateY(6px);
      box-shadow: 0 0 0 #288f88, 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    /* Mobile Adjustments */
    @media (max-width: 768px) {
      .title {
        font-size: 3rem;
      }

      .start-btn {
        font-size: 2.5rem;
        padding: 15px 40px;
      }

      .card {
        height: 50vh;
        min-height: 300px;
        padding: 20px;
        border-width: 4px;
      }

      .english-word {
        font-size: 3.5rem;
        margin-bottom: 20px;
      }

      .tamil-word {
        font-size: 4.5rem;
      }

      .category-text {
        font-size: 2.5rem;
      }

      .nav-controls {
        bottom: 10px;
        padding: 10px;
      }

      .nav-btn {
        width: 60px;
        height: 60px;
        font-size: 2rem;
        box-shadow: 0 4px 0 #288f88, 0 6px 10px rgba(0, 0, 0, 0.2);
      }

      .nav-btn:active {
        transform: translateY(4px);
        box-shadow: 0 0 0 #288f88, 0 2px 4px rgba(0, 0, 0, 0.2);
      }

      .timer {
        font-size: 1.5rem;
      }

      .home-btn {
        width: 50px;
        height: 50px;
        font-size: 1.5rem;
      }

      /* Hide desktop nav buttons on very small screens to encourage swipe, though keeping them is fine too */
    }


    .count-btn {
      background: white;
      border: 2px solid var(--secondary-color);
      color: var(--secondary-color);
      padding: 10px 20px;
      font-size: 1.5rem;
      border-radius: 15px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .count-btn.active {
      background: var(--secondary-color);
      color: white;
    }

    /* Hint text */
    .hint {
      position: absolute;
      bottom: 20px;
      color: #aaa;
      font-size: 1.2rem;
      font-style: italic;
    }
  </style>
</head>

  <!-- START SCREEN -->
  <div id="start-screen" class="screen active">
    <h1 class="title">தமிழ் Words<br>Flashcards</h1>

        <button class="count-btn" data-count="20">20</button>
        <button class="count-btn" data-count="30">30</button>
        <button class="count-btn" data-count="40">40</button>
        <button class="count-btn" data-count="50">50</button>
        <button class="count-btn" data-count="ALL">ALL</button>
      </div>
    </div>

    <label class="toggle-container" style="margin-bottom: 30px;">
      <input type="checkbox" id="randomize-toggle">
      <span>Randomize Words</span>
    </label>

    <button id="start-btn" class="start-btn">START</button>
  </div>

  <!-- MAIN SLIDE SCREEN -->

    <div class="top-bar">

    </div>

    <div class="flashcard-container">

        <div id="hint-text" class="hint">Tap to reveal</div>

      <div class="nav-controls">
        <button id="prev-btn" class="nav-btn">❮</button>
        <button id="next-btn" class="nav-btn">❯</button>

    </div>

    // STATE //
    let slides = [];
    let selectedCount = '10';
    let currentSlideIndex = 0;
    let isRandomized = false;
    let timerInterval = null;
    let timeLeft = 8;
    let isRevealed = false;

    // DOM ELEMENTS //
    const screens = {
      start: document.getElementById('start-screen'),
      slide: document.getElementById('slide-screen')
    };
    const startBtn = document.getElementById('start-btn');
    const randomizeToggle = document.getElementById('randomize-toggle');
    const homeBtn = document.getElementById('home-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const flashcard = document.getElementById('flashcard');

    const categoryText = document.getElementById('category-text');
    const englishWord = document.getElementById('english-word');
    const tamilWord = document.getElementById('tamil-word');
    const timerEl = document.getElementById('timer');
    const hintText = document.getElementById('hint-text');
    const wordCounter = document.getElementById('word-counter');

    // INITIALIZATION //
    function init() {
      startBtn.addEventListener('click', startGame);
      // Count buttons
      const countBtns = document.querySelectorAll('.count-btn');
      countBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          countBtns.forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          selectedCount = e.target.dataset.count;
        });
      });

      homeBtn.addEventListener('click', goHome);

      // Navigation
      nextBtn.addEventListener('click', handleNext);
      prevBtn.addEventListener('click', handlePrev);
      flashcard.addEventListener('click', handleCardClick);

      // Keyboard nav
      document.addEventListener('keydown', (e) => {
        if (screens.slide.classList.contains('active')) {
          if (e.key === 'ArrowRight' || e.key === ' ') {
            handleNext();
          } else if (e.key === 'ArrowLeft') {
            handlePrev();
          }
        }
      });

      // Touch Swipe Logic
      let touchStartX = 0;
      let touchEndX = 0;

      flashcard.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
      }, { passive: true });

      flashcard.addEventListener('touchend', e => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
      }, { passive: true });

      function handleSwipe() {
        const swipeThreshold = 50;
        if (touchEndX < touchStartX - swipeThreshold) {
          handleNext(); // Swiped left -> Next
        }
        if (touchEndX > touchStartX + swipeThreshold) {
          handlePrev(); // Swiped right -> Prev
        }
      }
    }

    // GENERATE SLIDES //
    function generateSlides() {
      slides = [];
      let allWords = [];

      // 1. Flatten all words and tag with categoryName
      wordsData.categories.forEach(category => {
        category.words.forEach(word => {
          allWords.push({
            type: 'word',
            english: word.english,
            tamil: word.tamil,
            categoryName: category.name
          });
        });
      });

      // 2. Shuffle if randomized
      if (isRandomized) {
        // Fisher-Yates shuffle
        for (let i = allWords.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [allWords[i], allWords[j]] = [allWords[j], allWords[i]];
        }
      }

      // 3. Apply Limit
      if (selectedCount !== 'ALL') {
        const limit = parseInt(selectedCount, 10);
        allWords = allWords.slice(0, limit);
      }

      // 4. Build slides array
      if (isRandomized) {
        slides = allWords;
      } else {
        // Add Category slides sequentially before words of that category
        let currentCat = null;
        allWords.forEach(word => {
          if (word.categoryName !== currentCat) {
            currentCat = word.categoryName;
            slides.push({
              type: 'category',
              name: currentCat
            });
          }
          slides.push(word);
        });
      }
    }

    // GAME FLOW //
    function startGame() {
      isRandomized = randomizeToggle.checked;
      generateSlides();
      currentSlideIndex = 0;

      screens.start.classList.remove('active');
      screens.slide.classList.add('active');

      renderSlide();
    }

    function goHome() {
      clearInterval(timerInterval);
      screens.slide.classList.remove('active');
      screens.start.classList.add('active');
    }

    function renderSlide() {
      // Reset states
      clearInterval(timerInterval);
      isRevealed = false;
      tamilWord.classList.remove('revealed');


      const slide = slides[currentSlideIndex];

      if (slide.type === 'category') {
        // Show Category layout
        categoryText.style.display = 'block';
        englishWord.style.display = 'none';
        tamilWord.style.display = 'none';
        timerEl.style.display = 'none';
        hintText.style.display = 'none';
        wordCounter.style.display = 'none';

        flashcard.style.backgroundColor = 'var(--accent-color)';
        flashcard.style.borderColor = 'var(--accent-color)';

        categoryText.textContent = slide.name;

      } else {
        // Show Word layout
        categoryText.style.display = 'none';
        englishWord.style.display = 'block';
        tamilWord.style.display = 'block';
        timerEl.style.display = 'block';
        hintText.style.display = 'block';
        wordCounter.style.display = 'block';

        const totalWordsCount = slides.filter(s => s.type === 'word').length;
        const wordsSeen = slides.slice(0, currentSlideIndex + 1).filter(s => s.type === 'word').length;
        wordCounter.textContent = `Word: ${wordsSeen} / ${totalWordsCount}`;

        flashcard.style.backgroundColor = 'white';
        flashcard.style.borderColor = 'var(--primary-color)';

        englishWord.textContent = slide.english.toUpperCase();
        tamilWord.textContent = slide.tamil;

        // Start Timer
        hintText.textContent = "Revealing in 8s...";
        timeLeft = 8;
        timerEl.textContent = timeLeft;

        timerInterval = setInterval(() => {
          timeLeft--;
          timerEl.textContent = timeLeft;
          hintText.textContent = `Revealing in ${timeLeft}s...`;

          if (timeLeft <= 0) {
            revealCard();
          }
        }, 1000);
      }

      // Update nav buttons states (optional UX improvement)
      prevBtn.style.opacity = currentSlideIndex === 0 ? '0.5' : '1';
    }

    function revealCard() {
      if (isRevealed || slides[currentSlideIndex].type === 'category') return;

      clearInterval(timerInterval);
      isRevealed = true;
      tamilWord.classList.add('revealed');
      timerEl.textContent = '0';
      hintText.textContent = "Tap or Next to continue";
    }

    // INTERACTION HANDLERS //
    function handleNext() {
      const slide = slides[currentSlideIndex];

      // If it's a word and not revealed, reveal it first
      if (slide.type === 'word' && !isRevealed) {
        revealCard();
        return;
      }

      // Otherwise move to next slide
      if (currentSlideIndex < slides.length - 1) {
        currentSlideIndex++;
        renderSlide();
      } else {
        // End of slides - go home
        goHome();
      }
    }

    function handlePrev() {
      if (currentSlideIndex > 0) {
        currentSlideIndex--;
        renderSlide();
      }
    }

    function handleCardClick() {
      const slide = slides[currentSlideIndex];
      if (slide.type === 'word' && !isRevealed) {
        revealCard();
      } else {
        handleNext();
      }
    }

    // STARTUP //
    init();

  </script>
